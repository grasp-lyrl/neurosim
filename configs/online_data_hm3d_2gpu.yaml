# Multi-GPU OnlineDataLoader over the FULL hm3d scene set, across 2 GPUs.
# Self-contained: simulator settings + the `online_data` block (roles, DR, knobs).
# Tuned for a 2x RTX 4090 (24 GB) box. Run with:
#   conda run -n neurosim python scripts/online_data_multigpu_demo.py \
#       --conf configs/online_data_hm3d_2gpu.yaml --batches 20

# ── Simulator settings (base_settings) ──────────────────────────────────────
simulator:
  world_rate: 1000 # Hz
  control_rate: 100 # Hz
  sim_time: 3.0 # seconds per episode (short; ~60 depth-anchored samples/episode)
  coord_transform: "rotorpy_to_hm3d"

  sensor_rates:
    event_camera_1: 1000 # Hz - high-frequency event accumulation
    depth_camera_1: 20 # Hz - anchor rate

visual_backend:
  gpu_id: 0 # overridden per-producer by online_data.gpu_ids
  scene: "data/hm3d/00000-kfPV7w3FaU5/kfPV7w3FaU5.basis.glb" # default; DR overrides per episode
  scene_dataset_config_file: "default"
  clear_color: [0.0, 0.0, 0.0, 1.0]
  default_agent: 0
  agent_height: 1.0
  agent_radius: 0.3
  agent_max_climb: 2.0
  agent_max_slope: 90.0
  enable_hbao: false
  frustum_culling: true
  seed: 324
  physics_config_file: "data/default.physics_config.json"
  enable_physics: true

  sensors:
    event_camera_1:
      type: "event"
      position: [0.0, 0.0, 0.05]
      orientation: [0.0, 0.0, 0.0]
      width: 640
      height: 480
      hfov: 90
      zfar: 1000.0
      backend: "cuda"
      contrast_threshold_neg: 0.15
      contrast_threshold_pos: 0.15
      anti_aliasing: 8

    depth_camera_1:
      type: "depth"
      position: [0.0, 0.0, 0.05]
      orientation: [0.0, 0.0, 0.0]
      width: 640
      height: 480
      hfov: 90
      zfar: 1000.0

controller:
  model: "rotorpy_se3"
  vehicle: "crazyflie"

dynamics:
  model: "rotorpy_multirotor_euler"
  vehicle: "crazyflie"

trajectory:
  model: "habitat_random_minsnap"
  seed: 42
  target_length: 30.0
  min_waypoint_distance: 2.0
  max_waypoints: 100
  v_avg: 1.0

# ── OnlineDataLoader configuration ──────────────────────────────────────────
online_data:
  batch_size: 16
  num_producers: 8 # 8 simulators total ...
  gpu_ids: [0, 1] # ... cycled across the two 4090s -> 4 sims per GPU
  base_seed: 0
  bus_maxsize: 256

  roles:
    anchor: [depth_camera_1] # depth tick defines the sample boundary
    stream: [event_camera_1] # events accumulate within each depth window

  randomization:
    resample_every: 10 # reload scene every N episodes (scene reload is expensive)
    # Use EVERY hm3d scene on disk — no need to enumerate 800 paths by hand.
    scenes_glob: data/hm3d/*/*.basis.glb
    sensors:
      event_camera_1:
        contrast_threshold_pos: {range: [0.1, 0.3]}
        contrast_threshold_neg: {range: [0.1, 0.3]}
    trajectory:
      v_avg: {range: [0.8, 1.5]}
