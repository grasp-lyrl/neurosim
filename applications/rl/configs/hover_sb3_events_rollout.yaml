# Rollout/inference config for hover-stop PPO policy execution.

env:
  obs_mode: events
  episode_seconds: 15.0
  init_speed_range: [0.5, 2.0]
  enable_navigable_check: true
  enable_visualization: false
  visualization_log_every_n_steps: 1

  event_representation:
    model: time_surface
    log_compression: 1.0
    downsample_factor: 1
    ts_decay_ms: 10.0
    sensor_uuid: null

  task:
    name: hover_stop
    config:
      w_velocity: 2.0
      w_events: 0.0
      w_angular: 0.05
      w_action: 0.01
      w_survival: 0.5
      crash_penalty: 100.0
      success_velocity_threshold: 0.15
      success_steps_required: 20

  scenes:
    - name: apartment_1
      path: data/scene_datasets/habitat-test-scenes/apartment_1.glb

  sensors:
    event_camera_1:
      type: event
      position: [0.0, 0.0, 0.05]
      orientation: [0.0, 0.0, 0.0]
      width: 640
      height: 480
      hfov: 120
      zfar: 20.0
      backend: cuda
      contrast_threshold_neg: 0.15
      contrast_threshold_pos: 0.15
      anti_aliasing: 8

  dynamics:
    model: rotorpy_multirotor_euler
    vehicle: crazyflie
    control_abstraction: cmd_ctbr
    ctbr_rate_limits:
      roll: 7.0
      pitch: 7.0
      yaw: 5.0

  simulator:
    world_rate: 1000
    control_rate: 100
    sim_time: 30
    coord_transform: rotorpy_to_hm3d
    sensor_rates:
      event_camera_1: 1000
    viz_rates:
      event_camera_1: 20

policy:
  device: auto
  deterministic: true
