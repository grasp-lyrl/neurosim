# Experimental/training hyperparameters for hover-stop PPO (events obs).

seed: 42
num_envs: 8
total_timesteps: 3000000

eval:
  freq: 2048
  episodes: 5
  num_envs: 1

vec_env:
  type: auto
  start_method: spawn

env:
  obs_mode: events
  episode_seconds: 15.0
  init_speed_range: [0.5, 2.0]
  enable_navigable_check: true

  event_sensor_uuid: null
  event_representation: time_surface
  event_log_compression: 1.0
  event_downsample_factor: 1
  event_ts_decay_ms: 10.0

  task:
    name: hover_stop
    config:
      w_velocity: 2.0
      w_events: 0.0
      w_angular: 0.05
      w_action: 0.01
      w_survival: 0.5
      crash_penalty: 100.0
      success_velocity_threshold: 0.15
      success_steps_required: 20

  scenes:
    - name: apartment_1
      path: data/scene_datasets/habitat-test-scenes/apartment_1.glb

  sensors:
    event_camera_1:
      type: event
      position: [0.0, 0.0, 0.05]
      orientation: [0.0, 0.0, 0.0]
      width: 640
      height: 480
      hfov: 120
      zfar: 20.0
      backend: cuda
      contrast_threshold_neg: 0.15
      contrast_threshold_pos: 0.15
      anti_aliasing: 8

  vehicle:
    dynamics_model: rotorpy_multirotor_euler
    vehicle_name: crazyflie
    control_mode: ctbr
    ctbr_rate_limits:
      roll: 7.0
      pitch: 7.0
      yaw: 5.0

  simulator:
    world_rate: 1000
    control_rate: 100
    sim_time: 30
    coord_transform: rotorpy_to_hm3d
    sensor_rates:
      event_camera_1: 1000
    viz_rates:
      event_camera_1: 20

ppo:
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 128
  n_epochs: 8
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.003
  log_std_init: -1.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: auto

vecnormalize:
  normalize_obs: true
  normalize_reward: true

wandb:
  log_freq: 100
