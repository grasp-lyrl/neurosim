# Training config for trajectory-dodge PPO (combined obs: events + state).
# The quad follows a free-space MinSnap trajectory while dodging dynamic
# obstacles using a learned velocity-correction policy.

seed: 42
num_envs: 32
total_timesteps: 3000000
n_gpus: 2

eval:
  freq: 32768
  episodes: 5
  num_envs: 1

vec_env:
  type: auto
  start_method: spawn

env:
  obs_mode: combined
  episode_seconds: 30.0
  enable_navigable_check: false

  event_sensor_uuid: null
  event_representation: time_surface
  event_log_compression: 1.0
  event_downsample_factor: 1
  event_ts_decay_ms: 10.0

  task:
    name: trajectory_dodge
    config:
      w_tracking: 1.0
      w_vel_tracking: 0.5
      w_correction: 0.05
      w_events: 0.0
      w_survival: 0.5
      crash_penalty: 100.0
      success_position_threshold: 1.0
      max_tracking_error: 1.5

  # Trajectory settings (new trajectory sampled each episode)
  trajectory:
    target_length: 20.0
    min_waypoint_distance: 0.2
    max_waypoints: 100
    v_avg: 1.0

  # SE3 controller for low-level tracking
  controller:
    model: rotorpy_se3
    vehicle: crazyflie

  scenes:
    - name: apartment_1
      path: data/scene_datasets/habitat-test-scenes/apartment_1.glb
    - name: skokloster
      path: data/scene_datasets/habitat-test-scenes/skokloster-castle.glb

  sensors:
    event_camera_1:
      type: event
      position: [0.0, 0.0, 0.05]
      orientation: [0.0, 0.0, 0.0]
      width: 640
      height: 480
      hfov: 120
      zfar: 20.0
      backend: cuda
      contrast_threshold_neg: 0.15
      contrast_threshold_pos: 0.15
      anti_aliasing: 8

  # Dynamic obstacles thrown at the agent
  dynamic_obstacles:
    enabled: true
    spawn_interval_s: 0.01
    max_concurrent: 200
    throw_speed_range_mps: [1.0, 3.0]
    angular_speed_range_radps: [0.0, 2.0]
    radial_distance_range_m: [2.5, 3.0]
    relative_height_range_m: [-0.25, 1.0]
    aim_noise_std_m: 0.15
    templates:
      - handle: "cube"
        motion_mode: "dynamic_throw"
        scale: [0.12, 0.12, 0.12]
        mass: 0.25
        ttl_s: 2.5
      - handle: "uvSphereSolid"
        motion_mode: "dynamic_throw"
        scale: [0.10, 0.10, 0.10]
        mass: 0.20
        ttl_s: 2.5

  dynamics:
    model: rotorpy_multirotor_euler
    vehicle: crazyflie
    control_abstraction: velocity_correction
    max_correction_mps: 2.0

  simulator:
    world_rate: 1000
    control_rate: 100
    sim_time: 30
    coord_transform: rotorpy_to_hm3d

    sensor_rates:
      event_camera_1: 1000

    viz_rates:
      event_camera_1: 20

ppo:
  learning_rate: 0.0003
  n_steps: 1024
  batch_size: 128
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.003
  log_std_init: -1.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: auto

vecnormalize:
  normalize_obs: true
  normalize_reward: true
