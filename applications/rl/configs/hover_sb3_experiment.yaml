# Experimental/training hyperparameters for hover-stop PPO.
# Keep frequently tuned settings here instead of argparse.

settings: configs/apartment_1-rl-settings.yaml
obs_mode: combined
seed: 1
total_timesteps: 1000000
eval_freq: 2048
eval_episodes: 5

episode_seconds: 8.0
body_rate_limit: 8.0
event_downsample_factor: 1
init_speed_min: 0.5
init_speed_max: 1.0
enable_navigable_check: true

event_representation: event_frame
event_log_compression: null

learning_rate: 0.0003
n_steps: 512
batch_size: 128
n_epochs: 10
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.005
vf_coef: 0.5
max_grad_norm: 0.5

device: auto
normalize_obs: true
normalize_reward: true

wandb_log_freq: 100
