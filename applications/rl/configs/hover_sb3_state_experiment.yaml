# Experimental/training hyperparameters for hover-stop PPO.

settings: configs/apartment_1-rl-settings.yaml
obs_mode: state
seed: 42
num_envs: 1
total_timesteps: 10000000

# Desired eval cadence in total environment steps (auto-adjusted by num_envs).
eval_freq: 2048
eval_episodes: 5
eval_num_envs: 1

episode_seconds: 15.0
event_downsample_factor: 1
init_speed_min: 0.5
init_speed_max: 2.0
enable_navigable_check: true

event_representation: time_surface
event_ts_decay_ms: 10.0
event_log_compression: null

learning_rate: 0.0003
n_steps: 512
batch_size: 128
n_epochs: 8
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.003
log_std_init: -1.0
vf_coef: 0.5
max_grad_norm: 0.5

device: auto
normalize_obs: true
normalize_reward: true

wandb_log_freq: 100
