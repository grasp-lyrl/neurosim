# Experimental/training hyperparameters for hover-stop PPO (combined obs).
# Domain randomization: two habitat-test scenes + mild event-camera sampling
# (contrast + hfov). ``resample_every`` rebuilds the sim every N completed episodes.

seed: 42
num_envs: 16
total_timesteps: 3000000
n_gpus: 2

eval:
  # Total env-steps between evals (SB3 passes eval_freq // num_envs per vec step).
  freq: 32768
  episodes: 5
  num_envs: 1

vec_env:
  type: auto
  start_method: spawn

env:
  obs_mode: combined
  episode_seconds: 15.0
  init_speed_range: [0.5, 2.0]
  enable_navigable_check: true

  event_sensor_uuid: null
  event_representation: time_surface
  event_log_compression: 1.0
  event_downsample_factor: 1
  event_ts_decay_ms: 10.0

  task:
    name: hover_stop
    config:
      w_velocity: 2.0
      w_events: 0.0
      w_angular: 0.05
      w_action: 0.01
      w_survival: 0.5
      crash_penalty: 100.0
      success_velocity_threshold: 0.15
      success_steps_required: 20

  # Scenes, sensors, dynamics (see configs/*-settings.yaml), simulator.
  scenes:
    - name: apartment_1
      path: data/scene_datasets/habitat-test-scenes/apartment_1.glb
    - name: skokloster
      path: data/scene_datasets/habitat-test-scenes/skokloster-castle.glb

  sensors:
    event_camera_1:
      type: event
      position: [0.0, 0.0, 0.05]
      orientation: [0.0, 0.0, 0.0]
      width: 640
      height: 480
      hfov: 120
      zfar: 20.0
      backend: cuda
      contrast_threshold_neg: 0.15
      contrast_threshold_pos: 0.15
      anti_aliasing: 8

  dynamics:
    model: rotorpy_multirotor_euler
    vehicle: crazyflie
    control_abstraction: cmd_ctbr
    ctbr_rate_limits:
      roll: 7.0
      pitch: 7.0
      yaw: 5.0

    # Optional multirotor parameter sampling (see ``RotorpyCtbrVehicle.randomize``).
    domain_randomization:
      enabled: true
      resample_every: 50
      scales:
        mass: [0.85, 1.15]
        k_eta: [0.9, 1.1]
        k_m: [0.9, 1.1]
        rotor_speed_min: [1.0, 1.0]
        rotor_speed_max: [0.95, 1.05]

  simulator:
    world_rate: 1000
    control_rate: 100
    sim_time: 30
    coord_transform: rotorpy_to_hm3d

    sensor_rates:
      event_camera_1: 1000

    viz_rates:
      event_camera_1: 20

    domain_randomization:
      enabled: true
      resample_every: 50
      sensors:
        event_camera_1:
          contrast_threshold_neg:
            range: [0.1, 0.3]
          contrast_threshold_pos:
            range: [0.1, 0.3]
          hfov:
            choices: [90, 120]

ppo:
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 128
  n_epochs: 8
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.003
  log_std_init: -1.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: auto

vecnormalize:
  normalize_obs: true
  normalize_reward: true

wandb:
  log_freq: 100
