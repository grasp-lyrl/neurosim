# Experimental/training hyperparameters for hover-stop PPO.

seed: 42
num_envs: 8
total_timesteps: 3000000

eval:
  freq: 2048
  episodes: 5
  num_envs: 1

vec_env:
  type: auto
  start_method: spawn

env:
  settings: configs/apartment_1-rl-settings.yaml
  resample_on_reset: false
  obs_mode: combined
  episode_seconds: 15.0
  event_sensor_uuid: null
  event_clip: 10.0
  event_downsample_factor: 1
  init_speed_range: [0.5, 2.0]
  event_representation: time_surface
  event_log_compression: null
  event_ts_decay_ms: 10.0
  enable_navigable_check: true
  enable_visualization: false
  visualization_log_every_n_steps: 1
  task:
    name: hover_stop
    config:
      w_velocity: 2.0
      w_events: 0.0
      w_angular: 0.05
      w_action: 0.01
      w_survival: 0.5
      crash_penalty: 100.0
      success_velocity_threshold: 0.15
      success_steps_required: 20
  vehicle:
    dynamics_model: rotorpy_multirotor_euler
    vehicle_name: crazyflie
    control_mode: ctbr
    ctbr_rate_limits:
      roll: 7.0
      pitch: 7.0
      yaw: 5.0
    domain_randomization:
      enabled: false
      scales:
        mass: [1.0, 1.0]
        k_eta: [1.0, 1.0]
        k_m: [1.0, 1.0]
        rotor_speed_min: [1.0, 1.0]
        rotor_speed_max: [1.0, 1.0]

  # Domain randomization (scene, sensor parameters, etc.)
  # Uncomment to enable. Each worker samples from these specs on construction
  # and (if resample_on_reset is true) on every episode reset.
  # domain_randomization:
  #   scenes:
  #     - name: apartment_1
  #       scene_path: data/scene_datasets/habitat-test-scenes/apartment_1.glb
  #     - name: skokloster
  #       scene_path: data/scene_datasets/habitat-test-scenes/skokloster-castle.glb
  #   sensors:
  #     event_camera_1:
  #       contrast_threshold_neg:
  #         range: [0.1, 0.6]
  #       contrast_threshold_pos:
  #         range: [0.1, 0.6]
  #       hfov:
  #         choices: [90, 100, 120]

ppo:
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 128
  n_epochs: 8
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.003
  log_std_init: -1.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: auto

vecnormalize:
  normalize_obs: true
  normalize_reward: true

wandb:
  log_freq: 100
